---
deprecations:
  - |
    Deprecation of ``num_qubits`` and automatic circuit alignment. The ``num_qubits``
    argument and the  automatic qubit alignment (padding or resizing) of ``feature_map`` and
    ``ansatz`` circuits are deprecated as of version 0.10.0 and will be removed after a 6-month
    deprecation period. Users must ensure that ``feature_map`` and ``ansatz`` are explicitly
    constructed with the same number of qubits before passing them to APIs that previously
    accepted ``num_qubits``. In a future release, providing ``num_qubits`` or passing circuits
    with different number of qubits will raise an error.
    See https://github.com/qiskit-community/qiskit-machine-learning/issues/1010 for more details.
