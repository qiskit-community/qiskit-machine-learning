---
fixes:
  - |
    Fixed ``SamplerQNN._postprocess`` to correctly handle transpiled
    circuits where logical qubits are mapped to non-trivial physical
    positions. Previously, the method filtered measurement results by
    integer value (``ki < 2**num_virtual_qubits``), which silently
    discarded valid measurements when logical qubits were placed at
    high physical positions by the transpiler. The fix uses the circuit
    layout to marginalize over ancilla qubits instead of filtering by
    integer value.
    See `#1040 <https://github.com/qiskit-community/qiskit-machine-learning/issues/1040>`_.
